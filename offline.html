<!DOCTYPE html>
<html lang="de-CH">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="description" content="FamilyOS – die installierbare App für den Familienalltag.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

  <meta name="theme-color" content="#2F6B5F">
  <meta name="color-scheme" content="light dark">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="FamilyOS">

  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">

  <title>FamilyOS</title>

  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      background: #f7f8f7;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      color: #2f6b5f;
      background: #f7f8f7;
      z-index: 9999;
      transition: opacity .25s ease;
    }

    #loading-card {
      text-align: center;
      padding: 28px;
    }

    #loading-logo {
      width: 78px;
      height: 78px;
      border-radius: 22px;
      margin-bottom: 14px;
    }

    @media (prefers-color-scheme: dark) {
      html, body, #loading {
        background: #111513;
        color: #dce7e2;
      }
    }
  </style>
</head>
<body>
  <div id="loading" role="status" aria-live="polite">
    <div id="loading-card">
      <img id="loading-logo" src="icons/Icon-192.png" alt="">
      <div>FamilyOS wird geladen …</div>
    </div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.opacity = '0';
        setTimeout(() => loading.remove(), 300);
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js', { scope: './' })
          .catch(function (error) {
            console.warn('Service Worker konnte nicht registriert werden:', error);
          });
      });
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
